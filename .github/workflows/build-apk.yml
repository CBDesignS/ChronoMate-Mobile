name: Build ChronoMate APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ChronoMate.html"
      - "style.css"
      - "app.js"
      - "session.js"
      - "report.js"
      - "assets/**"
      - "data/**"
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.2.1"

      - name: Copy ChronoMate web files into APK
        run: |
          rm -rf app/src/main/assets/www
          mkdir -p app/src/main/assets/www/assets
          mkdir -p app/src/main/assets/www/data

          cp ChronoMate.html app/src/main/assets/www/
          cp style.css app/src/main/assets/www/
          cp app.js app/src/main/assets/www/
          cp session.js app/src/main/assets/www/
          cp report.js app/src/main/assets/www/
          cp -R assets/. app/src/main/assets/www/assets/
          cp -R data/. app/src/main/assets/www/data/

      - name: Restore permanent release keystore
        env:
          CHRONOMATE_KEYSTORE_BASE64: ${{ secrets.CHRONOMATE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$CHRONOMATE_KEYSTORE_BASE64" ]; then
            echo "Missing GitHub secret: CHRONOMATE_KEYSTORE_BASE64"
            exit 1
          fi
          printf '%s' "$CHRONOMATE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/chronomate-release.jks"

      - name: Build signed release APK
        env:
          CHRONOMATE_KEYSTORE_PATH: ${{ runner.temp }}/chronomate-release.jks
          CHRONOMATE_STORE_PASSWORD: ${{ secrets.CHRONOMATE_STORE_PASSWORD }}
          CHRONOMATE_KEY_ALIAS: ${{ secrets.CHRONOMATE_KEY_ALIAS }}
          CHRONOMATE_KEY_PASSWORD: ${{ secrets.CHRONOMATE_KEY_PASSWORD }}
        run: gradle --no-daemon assembleRelease

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk ChronoMate-v0.6.2.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChronoMate-v0.6.2
          path: ChronoMate-v0.6.2.apk
          if-no-files-found: error
